model_version: threat-cnn-v2
labels:
  - chainsaw
  - gunshot
  - vehicle
  - fire_crackle
  - background_unknown
audio:
  sample_rate: 16000
  clip_seconds: 4.0
  n_mels: 64
training:
  batch_size: 16
  epochs: 12
  learning_rate: 0.001
  seed: 42
  device: auto
  class_weighting: false
  weighted_sampler: true
  sampler_weight_power: 0.75
  sampler_label_multipliers:
    chainsaw: 24.0
    gunshot: 2.0
    vehicle: 1.0
    fire_crackle: 16.0
    background_unknown: 1.5
  checkpoint_each_epoch: true
evaluation:
  threshold_step: 0.05
  min_precision:
    chainsaw: 0.55
    gunshot: 0.8
    vehicle: 0.75
    fire_crackle: 0.6
    background_unknown: 0.8
  selection:
    background_false_positive_penalty: 0.75
    min_recall:
      chainsaw: 0.6
      gunshot: 0.8
      vehicle: 0.7
augmentation:
  enabled: true
  gain_min: 0.85
  gain_max: 1.15
  noise_std: 0.003
  max_shift_fraction: 0.08
  max_time_mask_frames: 12
  max_freq_mask_bins: 8
paths:
  manifest: data/audio/manifests/threat_manifest_v1.csv
  artifact_dir: models/audio/threat_cnn_v2
