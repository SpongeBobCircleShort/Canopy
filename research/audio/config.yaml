model_version: threat-cnn-v1
labels:
  - chainsaw
  - gunshot
  - vehicle
  - fire_crackle
  - background_unknown
audio:
  sample_rate: 16000
  clip_seconds: 4.0
  n_mels: 64
training:
  batch_size: 16
  epochs: 12
  learning_rate: 0.001
  seed: 42
  device: auto
  class_weighting: false
  weighted_sampler: true
  sampler_weight_power: 0.75
  sampler_label_multipliers:
    chainsaw: 24.0
    gunshot: 4.0
    vehicle: 1.0
    fire_crackle: 18.0
    background_unknown: 1.0
  checkpoint_each_epoch: true
augmentation:
  enabled: true
  gain_min: 0.85
  gain_max: 1.15
  noise_std: 0.003
  max_shift_fraction: 0.08
  max_time_mask_frames: 12
  max_freq_mask_bins: 8
paths:
  manifest: data/audio/manifests/threat_manifest_v1.csv
  artifact_dir: models/audio/threat_cnn_v1
